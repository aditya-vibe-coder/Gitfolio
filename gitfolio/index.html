  <!-- Schema Markup — FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "Does Gitfolio integrate with LeetCode?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Premium users can connect their LeetCode and Codeforces profiles to get a combined placement score. Your DSA stats are integrated into your overall profile score, because Indian product companies care enormously about competitive programming."
        }
      },
      {
        "@type": "Question",
        "name": "How accurate is the Company Fit Score?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The Company Fit Score is generated by analyzing your profile against publicly known hiring signals and interview difficulty patterns for each company. It is an honest, AI-powered assessment of where you stand relative to typical expectations at companies like Amazon, Flipkart, and Razorpay."
        }
      },
      {
        "@type": "Question",
        "name": "Do I need a portfolio website if I already have a GitHub profile?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "A GitHub profile shows code but does not tell your story. A portfolio website lets you control what recruiters see — your best projects, target role, and tech stack. Most Indian tech recruiters check both. For frontend, full-stack, and product roles, a portfolio differentiates you from candidates who only have a GitHub."
        }
      },
      {
        "@type": "Question",
        "name": "What should a developer portfolio website include?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "A developer portfolio needs a clear headline, 3-5 best projects with live links, key technical skills, a contact method, and GitHub and LinkedIn links. For Indian placements, include CGPA, graduation year, and availability. Avoid long bios or heavy animations that slow load time."
        }
      },
      {
        "@type": "Question",
        "name": "How do I make my GitHub portfolio visible to recruiters in India?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Update your GitHub README with a clear summary and tech stack. Pin 6 of your best repositories. Give each repo a one-sentence description and a live demo link. For Indian recruiters, real-world projects with payment integrations or dashboard tools stand out more than algorithmic challenges."
        }
      },
      {
        "@type": "Question",
        "name": "What projects should a fresher put in their developer portfolio for Indian placements?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Include 2-3 projects that show real problem-solving: a full-stack app, a deployed frontend project, and optionally one with an API or payment integration. Avoid tutorial clones like weather apps. Projects with live deployments and measurable impact in descriptions get more recruiter attention."
        }
      }
    ]
  }
  </script>
